{% macro render_todo(todo, depth=0, categories=None) %}
<div class="todo-item {% if todo.completed %}todo-done{% endif %}"
     id="todo-{{ todo.id }}"
     data-todo-id="{{ todo.id }}"
     draggable="true"
     style="padding-left: {{ depth * 24 }}px">
  <div class="todo-main">
    <span class="todo-drag-handle" title="Drag to reorder or nest">&#8942;&#8942;</span>
    <button class="todo-checkbox {% if todo.completed %}checked{% endif %}"
            hx-post="/todos/{{ todo.id }}/toggle"
            hx-target="#todo-list"
            hx-swap="innerHTML">
    </button>
    <span class="todo-title {% if todo.completed %}done{% endif %}">{{ todo.title }}</span>
    <div class="todo-actions">
      {% if depth == 0 and categories %}
      <select class="category-select todo-category-select" title="Category"
              onchange="fetch('/todos/{{ todo.id }}/category', {method:'POST', body: new URLSearchParams({category_id: this.value})}).then(r=>r.text()).then(html=>{if(typeof isCarouselMode==='function'&&isCarouselMode()){refreshCarousel();return;}document.getElementById('todo-list').innerHTML=html; htmx.process(document.getElementById('todo-list'));});">
        <option value="">--</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if todo.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
      {% endif %}
      <button class="todo-delete" title="Delete"
              hx-delete="/todos/{{ todo.id }}"
              hx-target="#todo-list"
              hx-swap="innerHTML"
>&#10005;</button>
    </div>
  </div>
  {% if todo.children %}
  <div class="todo-children">
    {% for child in todo.children %}
      {{ render_todo(child, depth + 1, categories) }}
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endmacro %}
